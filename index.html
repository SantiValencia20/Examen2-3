<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Examen 2 - Proyecto Web</title>

  <!-- SEO Meta Tags -->
  <meta name="author" content="Santiago valencia, Luis Zapata, Miguel Moncada">
  <meta name="description"
    content="Proyecto web creado para evaluación, cumpliendo con estándares de BEM y diseño responsive.">
  <meta name="keywords" content="HTML, CSS, BEM, Bootstrap, Responsive Design">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/main.css">
</head>

<body>

  <!-- TOP BAR -->
  <div class="topbar py-2 d-none d-lg-block">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-lg-8">
          <div class="topbar__info d-flex gap-4">
            <div class="topbar__item text-muted">
              <i class="bi bi-geo-alt-fill me-2"></i>123 Street, New York, USA
            </div>
            <div class="topbar__item text-muted">
              <i class="bi bi-clock me-2"></i>Mon-Sat 09am-5pm, Sun Closed
            </div>
          </div>
        </div>
        <div class="col-lg-4 text-end">
          <div class="topbar__links d-inline-flex">
            <a href="#" class="topbar__link text-muted text-decoration-none">Career</a>
            <span class="mx-2 text-muted">/</span>
            <a href="#" class="topbar__link text-muted text-decoration-none">Support</a>
            <span class="mx-2 text-muted">/</span>
            <a href="#" class="topbar__link text-muted text-decoration-none">Terms</a>
            <span class="mx-2 text-muted">/</span>
            <a href="#" class="topbar__link text-muted text-decoration-none">FAQs</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- HEADER AZUL (Logotipo y Contacto) -->
  <header class="header text-white pt-4 pb-5"> <!-- Aumentamos el padding bottom (pb-5) -->
    <div class="container pb-2.5"> <!-- Relleno extra abajo para compensar que la barra subió -->
      <div class="row align-items-center">
        <!-- Contacto Izquierdo -->
        <div class="col-md-4 d-none d-md-flex align-items-center">
          <i class="bi bi-telephone-inbound display-6 me-3"></i> <!-- Icono un poco más grande -->
          <div class="header__contact">
            <h5 class="mb-0 fw-bold">Call Now</h5>
            <span class="header__text">+012 345 6789</span>
          </div>
        </div>

        <!-- Logo Centro -->
        <div class="col-md-4 text-center">
          <h1 class="header__logo fw-bold mb-0">Lab<span class="text-dark">sky</span></h1>
        </div>

        <!-- Contacto Derecho -->
        <div class="col-md-4 d-none d-md-flex align-items-center justify-content-end">
          <i class="bi bi-envelope-open display-6 me-3"></i>
          <div class="header__contact text-start">
            <h5 class="mb-0 fw-bold">Mail Now</h5>
            <span class="header__text">info@example.com</span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- NAVEGACIÓN BLANCA FLOTANTE -->
  <div class="container nav-wrapper" style="position: relative; z-index: 10;">
    <nav class="navbar main-nav navbar-expand-lg bg-white shadow-sm px-4 py-3">
      <!-- Botón para móviles -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Menú de navegación -->
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav"> <!-- Se quitó mx-auto para alineación similar a la imagen -->
          <li class="nav-item">
            <a class="nav-link active" href="#">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Services</a>
          </li>

          <!-- Dropdown -->
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown"
              aria-expanded="false">
              Pages
            </a>
            <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
              <li><a class="dropdown-item" href="#">Página 1</a></li>
              <li><a class="dropdown-item" href="#">Página 2</a></li>
            </ul>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">Contact</a>
          </li>
        </ul>

        <!-- Los iconos sociales -->
        <div class="social-nav d-none d-lg-flex ms-auto">
          <a href="#" class="social-nav__icon"><i class="bi bi-facebook"></i></a>
          <a href="#" class="social-nav__icon"><i class="bi bi-twitter"></i></a>
          <a href="#" class="social-nav__icon"><i class="bi bi-linkedin"></i></a>
          <a href="#" class="social-nav__icon"><i class="bi bi-youtube"></i></a>
        </div>
      </div>
    </nav>
  </div>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
