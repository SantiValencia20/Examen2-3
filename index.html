<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio de Exámenes</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            z-index: -1;
            opacity: 0.2;
        }
        .card {
            transition: all 0.3s ease;
            cursor: pointer;
            border-radius: 15px;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15) !important;
        }
    </style>
</head>
<body>
    <div class="container text-center py-5">
        <h1 class="mb-3 fw-bold">Mis Exámenes Web</h1>
        <p class="text-muted mb-5 fs-5">Selecciona el proyecto que deseas visualizar</p>
        
        <div class="row justify-content-center g-4">
            <!-- Tarjeta Examen 2 -->
            <div class="col-md-5 col-lg-4">
                <a href="./Examen2/index.html" class="text-decoration-none text-dark">
                    <div class="card h-100 shadow-sm border-0 py-4 px-2">
                        <div class="card-body">
                            <h3 class="card-title text-primary fw-bold mb-3">Examen 2</h3>
                            <p class="card-text text-muted">Diseño Corporativo aplicando buenas prácticas, metodología BEM y Bootstrap.</p>
                        </div>
                    </div>
                </a>
            </div>

            <!-- Tarjeta Examen 3 -->
            <div class="col-md-5 col-lg-4">
                <a href="./Examen3/index.html" class="text-decoration-none text-dark">
                    <div class="card h-100 shadow-sm border-0 py-4 px-2">
                        <div class="card-body">
                            <h3 class="card-title text-success fw-bold mb-3">Examen 3</h3>
                            <p class="card-text text-muted">Maquetación responsive, flexbox y estilos avanzados.</p>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
